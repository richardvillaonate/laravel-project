networks:
  laravel_network:

services:
  server:
    build:
      context: .
      dockerfile: dockerfiles/nginx.dockerfile
    ports:
      - 8080:80
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - mysql
    container_name: laravel_server
    networks:
      - laravel_network

  php:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src:/var/www/html:delegated
    container_name: laravel_php
    networks:
      - laravel_network

  mysql:
    image: mysql:8.0.1
    restart: unless-stopped
    tty: true
    container_name: laravel_mysql
    env_file:
      - mysql/.env
    ports:
      - 3307:3306
    networks:
      - laravel_network
    volumes:
      - ./mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    container_name: laravel_phpmyadmin
    depends_on:
      - mysql
    ports:
      - 8090:80
    environment:
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=root.pa55
    networks:
      - laravel_network

  composer:
    build:
      context: .
      dockerfile: dockerfiles/composer.dockerfile
    volumes:
      - ./src:/var/www/html
    depends_on:
      - php
    networks:
      - laravel_network

  artisan:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src:/var/www/html
    entrypoint: ["php", "/var/www/html/artisan"]
    networks:
      - laravel_network

  redis:
    image: redis:alpine
    container_name: laravel_redis
    ports:
      - 6379:6379
    networks:
      - laravel_network

  mailhog:
    image: mailhog/mailhog
    container_name: laravel_mailhog
    ports:
      - 8025:8025
    networks:
      - laravel_network

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: laravel_meilisearch
    environment:
      - MEILI_NO_ANALYTICS=true
    ports:
      - 7700:7700
    networks:
      - laravel_network

  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    container_name: laravel_soketi
    ports:
      - 6001:6001
    environment:
      - SOKETI_DEBUG=1
      - DEFAULT_APP_ID=app-id
      - DEFAULT_APP_KEY=app-key
      - DEFAULT_APP_SECRET=app-secret
    networks:
      - laravel_network

  nextjs:
    image: node:20.12.2
    container_name: laravel_nextjs
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - 3000:3000
    command: sh -c "npm install && npm run dev"
    networks:
      - laravel_network
